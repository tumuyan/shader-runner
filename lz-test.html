<!DOCTYPE html>

<script>
// 直接从 shader.html 中复制 lz-string 代码

    var f = String.fromCharCode;
    var keyStrUri = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+-$";

                    var c = context_w.charCodeAt(0);
                    for (var jj = 0; jj < context_numBits; jj++) { context_data_val = (context_data_val << 1); context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
                    var bits = 0; var t = c; while (t > 0) { bits++; t >>= 1; }
                    var bs = ""; while (bits > 0) { bs = String(1 & c) + bs; c >>= 1; bits--; }
                    for (var jj = 0; jj < bits; jj++) { context_data_val = (context_data_val << 1); if (bs[jj] == "1") context_data_val++; context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
                    delete context_dictionaryToCreate[context_w];
                } else {
                    var c = context_dictionary[context_w];
                    for (var jj = 0; jj < context_numBits; jj++) { context_data_val = (context_data_val << 1); if ((c & 1) !== 0) context_data_val++; c >>= 1; context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
                }
                context_enlargeIn--; if (context_enlargeIn === 0) { context_enlargeIn = 2 << context_numBits; context_numBits++; }
                context_dictionary[context_wc] = context_dictSize++; context_w = String(context_c);
            }
        }
        if (context_w !== "") {
            if (Object.prototype.hasOwnProperty.call(context_dictionaryToCreate, context_w)) {
                var c = context_w.charCodeAt(0);
                for (var jj = 0; jj < context_numBits; jj++) { context_data_val = (context_data_val << 1); context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
                var bits = 0; var t = c; while (t > 0) { bits++; t >>= 1; }
                while (bits > 0) { bs = String(1 & c) + bs; c >>= 1; bits--; }
                for (var jj = 0; jj < bits; jj++) { context_data_val = (context_data_val << 1); if (bs[jj] == "1") context_data_val++; context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
                delete context_dictionaryToCreate[context_w];
            } else {
                var c = context_dictionary[context_w];
                for (var jj = 0; jj < context_numBits; jj++) { context_data_val = (context_data_val << 1); if ((c & 1) !== 0) context_data_val++; c >>= 1; context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
            }
            context_enlargeIn--; if (context_enlargeIn === 0) { context_enlargeIn = 2 << context_numBits; context_numBits++; }
        }
        var value = 1;
        for (var jj = 0; jj < context_numBits; jj++) { context_data_val = (context_data_val << 1); if (value == 1) context_data_val++; value = 0; context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; } }
        while (true) { context_data_val = (context_data_val << 1); context_data_position++; if (context_data_position === bitsPerChar) { context_data_position = 0; context_data.push(getCharFromInt(context_data_val)); context_data_val = 0; break; } }

        while (power !== maxpower) { var resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; }
        switch (bits) {
            case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1; while (power !== maxpower) { resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; } c = f(bits); break;
            case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1; while (power !== maxpower) { resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; } c = f(bits); break;
            case 2: return "";
        }
        dictionary[3] = c; w = c; result.push(c);
        while (true) {
            if (errorCount++ > 50000) return result.join("");
            bits = 0; maxpower = Math.pow(2, numBits); power = 1;
            while (power !== maxpower) { resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; }
            switch ((c = bits)) {
                case 0: bits = 0; maxpower = Math.pow(2, 8); power = 1; while (power !== maxpower) { resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; } dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
                case 1: bits = 0; maxpower = Math.pow(2, 16); power = 1; while (power !== maxpower) { resb = data_val & data_position; data_position >>= 1; if (data_position === 0) { data_position = resetValue; data_val = getNextValue(); } bits = (resb !== 0) ? bits | power : bits; power <<= 1; } dictionary[dictSize++] = f(bits); c = dictSize - 1; enlargeIn--; break;
                case 2: return result.join("");

            if (enlargeIn === 0) { enlargeIn = 2 << numBits; numBits++; }

        if (str == null) return ""; if (str === "") return null;
        var input = [], ii;
        for (ii = 0; ii < str.length; ii += 1) { var c = str.charAt(ii); var idx = keyStrUri.indexOf(c); if (idx < 0) return null; input.push(idx); }

    }
    return { compressToEncodedURIComponent: compressToEncodedURIComponent, decompressFromEncodedURIComponent: decompressFromEncodedURIComponent };
})();

// 测试：用长字符串验证压缩解压
const testStr = "void mainImage(out vec4 f, in vec2 c) { f = vec4(1.0); } ".repeat(300);
console.log('原文长度:', testStr.length);
const compressed = LZString.compressToEncodedURIComponent(testStr);
console.log('压缩后长度:', compressed.length);
console.log('含 + 数量:', (compressed.match(/\+/g) || []).length);
const decompressed = LZString.decompressFromEncodedURIComponent(compressed);
console.log('解压成功:', decompressed === testStr);
if (decompressed !== testStr) {
    console.log('解压结果长度:', decompressed ? decompressed.length : 'null');
    console.log('前100:', decompressed ? decompressed.slice(0,100) : null);
}

// 测试 .repeat(500)
const testStr2 = "void mainImage(out vec4 f, in vec2 c) { f = vec4(1.0); } ".repeat(500);
console.log('\n--- 测试 500 次重复 ---');
const c2 = LZString.compressToEncodedURIComponent(testStr2);
console.log('压缩后长度:', c2.length);
console.log('含 $ 数量:', (c2.match(/\$/g) || []).length);
const d2 = LZString.decompressFromEncodedURIComponent(c2);
console.log('解压成功:', d2 === testStr2);
</script>
