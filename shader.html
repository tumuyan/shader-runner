<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShaderToy 本地运行器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #111;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #glCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* 右键上下文菜单：切换 shader */
        #inputOverlay {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 20px 24px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 100;
            max-height: 70vh;
            overflow-y: auto;
        }

        #inputOverlay.open {
            transform: translateY(0);
        }

        #inputOverlay label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e8553a;
        }

        #inputOverlay textarea {
            width: 100%;
            min-height: 240px;
            background: #1a1a2e;
            color: #8f8;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 14px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: vertical;
            tab-size: 4;
        }

        #inputOverlay textarea:focus {
            outline: none;
            border-color: #e8553a;
        }

        .overlay-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .overlay-actions button {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-apply {
            background: #e8553a;
            color: #fff;
        }
        .btn-apply:hover { background: #d0442a; }
        .btn-close {
            background: #333;
            color: #ccc;
        }
        .btn-close:hover { background: #444; }
        .btn-default {
            background: #2a2a3e;
            color: #aaa;
        }
        .btn-default:hover { background: #3a3a4e; }

        .hint {
            font-size: 12px;
            color: #777;
            margin-top: 8px;
        }
        .hint kbd {
            background: #2a2a3e;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #444;
            font-size: 11px;
        }

        /* 顶部简易 HUD */
        #hud {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.5s;
        }
        #hud.show { opacity: 1; }

        /* 提示按钮 */
        #editBtn {
            position: fixed;
            top: 12px;
            right: 12px;
            z-index: 60;
            background: rgba(0,0,0,0.5);
            color: #888;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #editBtn:hover {
            background: rgba(232,85,58,0.2);
            border-color: #e8553a;
            color: #e8553a;
        }

        @media (max-width: 640px) {
            #inputOverlay { padding: 14px; }
            #inputOverlay textarea { min-height: 160px; }
        }
    </style>
</head>
<body>

    <canvas id="glCanvas"></canvas>

    <div id="hud">按 <kbd>Esc</kbd> 关闭 · 拖拽旋转视角</div>
    <button id="editBtn">✎ 编辑 Shader</button>

    <div id="inputOverlay">
        <label>粘贴 ShaderToy GLSL 代码（mainImage 函数体）</label>
        <textarea id="shaderCode" spellcheck="false"></textarea>
        <div class="overlay-actions">
            <button class="btn-apply" id="applyBtn">应用并运行</button>
            <button class="btn-close" id="closeBtn">关闭</button>
            <button class="btn-default" id="defaultBtn">恢复默认</button>
        </div>
        <div class="hint">
            从 <a href="https://www.shadertoy.com/view/MdcSRj" target="_blank" style="color:#e8553a;">ShaderToy</a> 复制代码粘贴到上方文本框
            · 快捷键 <kbd>E</kbd> 打开编辑器 · <kbd>Esc</kbd> 关闭
        </div>
    </div>

    <script>
        // ============================================================
        // 1. 默认 ShaderToy 代码（MdcSRj 示例 — 你也可以手动替换）
        // ============================================================
        const DEFAULT_SHADER = `
// -----------------------------------------------
// 在此粘贴 ShaderToy 的 mainImage 函数体代码
// 例如：将 Shadertoy 中 "Image" 选项卡的所有代码
// 直接复制过来即可
// -----------------------------------------------

// 如果你还没有从 ShaderToy 复制代码，可以先试用下方的默认效果：
// (这是一个简单的彩色波浪示例)

vec4 mainImage(vec2 uv, float time) {
    vec2 p = (uv * 2.0 - 1.0) * vec2(1.0, 1.0);
    float r = length(p);
    float a = atan(p.y, p.x);
    float v = sin(r * 10.0 - time * 2.0) * 0.5 + 0.5;
    float h = a / 6.2832 + 0.5;
    vec3 col = 0.5 + 0.5 * cos(time * 0.5 + h + vec3(0.0, 2.0, 4.0));
    col *= v;
    return vec4(col, 1.0);
}
`;

        // ============================================================
        // 2. WebGL2 渲染引擎
        // ============================================================
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl2', {
            alpha: false,
            antialias: true,
            premultipliedAlpha: false,
            preserveDrawingBuffer: false,
        });

        if (!gl) {
            document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:40vh;">浏览器不支持 WebGL2</h1>';
            throw new Error('WebGL2 not supported');
        }

        // --- 编译 shader ---
        function compileShader(src, type) {
            const shader = gl.createShader(type);
            gl.shaderSource(shader, src);
            gl.compileShader(shader);
            if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
                console.error('Shader 编译错误:', gl.getShaderInfoLog(shader));
                return null;
            }
            return shader;
        }

        // --- 构建完整片段着色器（自动添加 ShaderToy 标准 uniforms）---
        const VERTEX_SHADER = `#version 300 es
        precision highp float;
        in vec2 aPosition;
        out vec2 vUv;
        void main() {
            gl_Position = vec4(aPosition, 0.0, 1.0);
            vUv = aPosition * 0.5 + 0.5;
        }`;

        function buildFragmentShader(userCode) {
            return `#version 300 es
        precision highp float;

        // ----- ShaderToy 标准 uniforms -----
        uniform vec3  iResolution;
        uniform float iTime;
        uniform float iTimeDelta;
        uniform float iFrame;
        uniform vec4  iMouse;
        uniform vec4  iDate;
        uniform float iSampleRate;

        // 纹理通道（降级：使用默认纹理）
        uniform sampler2D iChannel0;
        uniform sampler2D iChannel1;
        uniform sampler2D iChannel2;
        uniform sampler2D iChannel3;

        in vec2 vUv;
        out vec4 fragColor;

        // ----- 工具函数（与 ShaderToy 一致）-----
        vec4 texture2D(sampler2D sam, vec2 uv) {
            return texture(sam, uv);
        }
        vec4 texture2D(sampler2D sam, vec2 uv, float bias) {
            return texture(sam, uv, bias);
        }

        // ----- 用户代码入口 -----
        void mainImage(out vec4 fragColor, in vec2 fragCoord);

        // ----- main -----
        void main() {
            vec2 fragCoord = vUv * iResolution.xy;
            // 兼容 ShaderToy 的 mainImage 规范
            mainImage(fragColor, fragCoord);
            // 简单色调映射，避免过曝
            fragColor = clamp(fragColor, 0.0, 1.0);
        }

        // ========== 用户粘贴的代码从这里开始 ==========

        ${userCode}
        `;
        }

        // --- 创建 program ---
        let program = null;
        let uniforms = {};

        function createProgram(userCode) {
            if (program) {
                gl.deleteProgram(program);
            }

            const vs = compileShader(VERTEX_SHADER, gl.VERTEX_SHADER);
            const fsSource = buildFragmentShader(userCode);
            const fs = compileShader(fsSource, gl.FRAGMENT_SHADER);

            if (!vs || !fs) return false;

            const prog = gl.createProgram();
            gl.attachShader(prog, vs);
            gl.attachShader(prog, fs);
            gl.linkProgram(prog);

            if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
                console.error('Program 链接错误:', gl.getProgramInfoLog(prog));
                gl.deleteProgram(prog);
                return false;
            }

            gl.deleteShader(vs);
            gl.deleteShader(fs);

            program = prog;
            gl.useProgram(program);

            // 获取 uniform 位置
            const uniformNames = [
                'iResolution', 'iTime', 'iTimeDelta', 'iFrame',
                'iMouse', 'iDate', 'iSampleRate',
                'iChannel0', 'iChannel1', 'iChannel2', 'iChannel3'
            ];
            uniforms = {};
            for (const name of uniformNames) {
                uniforms[name] = gl.getUniformLocation(program, name);
            }

            // 设置纹理采样器
            gl.uniform1i(uniforms.iChannel0, 0);
            gl.uniform1i(uniforms.iChannel1, 1);
            gl.uniform1i(uniforms.iChannel2, 2);
            gl.uniform1i(uniforms.iChannel3, 3);

            return true;
        }

        // --- 默认纹理（替代 iChannel）---
        function createDefaultTexture() {
            const size = 4;
            const data = new Uint8Array([
                255, 255, 255, 255,   128, 128, 128, 255,
                128, 128, 128, 255,   255, 255, 255, 255,
            ]);
            const tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, size, size, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
            return tex;
        }

        // --- 几何体（全屏三角形）---
        const vertices = new Float32Array([-1, -1,   3, -1,   -1, 3]);
        const vao = gl.createVertexArray();
        gl.bindVertexArray(vao);
        const vbo = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);
        gl.enableVertexAttribArray(0);
        gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

        // --- 默认纹理绑定 ---
        const defaultTex = createDefaultTexture();
        for (let i = 0; i < 4; i++) {
            gl.activeTexture(gl.TEXTURE0 + i);
            gl.bindTexture(gl.TEXTURE_2D, defaultTex);
        }

        // ============================================================
        // 3. 运行时状态
        // ============================================================
        let startTime = performance.now() / 1000;
        let frameCount = 0;
        let paused = false;
        let pauseOffset = 0;

        const mouse = { x: 0, y: 0, bx: 0, by: 0, down: false };
        let lastTime = 0;

        function resize() {
            const dpr = Math.min(window.devicePixelRatio, 2);
            const w = canvas.clientWidth * dpr;
            const h = canvas.clientHeight * dpr;
            if (canvas.width !== w || canvas.height !== h) {
                canvas.width = w;
                canvas.height = h;
                gl.viewport(0, 0, w, h);
            }
        }

        // ============================================================
        // 4. 渲染循环
        // ============================================================
        function render(time) {
            resize();

            const now = time / 1000;
            const delta = lastTime ? now - lastTime : 0.016;
            lastTime = now;

            if (!paused) {
                const elapsed = now - startTime;
                const total = elapsed - pauseOffset;
                frameCount++;

                gl.useProgram(program);

                const w = canvas.width;
                const h = canvas.height;
                gl.uniform3f(uniforms.iResolution, w, h, 0);
                gl.uniform1f(uniforms.iTime, total);
                gl.uniform1f(uniforms.iTimeDelta, delta);
                gl.uniform1f(uniforms.iFrame, frameCount);
                gl.uniform1f(uniforms.iSampleRate, 44100);

                // iMouse: xy=当前位置, zw=按下位置
                gl.uniform4f(uniforms.iMouse, mouse.x, mouse.y, mouse.bx, mouse.by);

                // iDate
                const d = new Date();
                gl.uniform4f(uniforms.iDate,
                    d.getFullYear(),
                    d.getMonth() + 1,
                    d.getDate(),
                    (d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds()) / 86400
                );

                gl.bindVertexArray(vao);
                gl.drawArrays(gl.TRIANGLES, 0, 3);
            }

            requestAnimationFrame(render);
        }

        // ============================================================
        // 5. 事件
        // ============================================================

        // 鼠标
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) / rect.width * canvas.width;
            mouse.y = (canvas.height - (e.clientY - rect.top) / rect.height * canvas.height);
        });
        canvas.addEventListener('mousedown', e => {
            mouse.down = true;
            mouse.bx = mouse.x;
            mouse.by = mouse.y;
        });
        canvas.addEventListener('mouseup', () => { mouse.down = false; });
        canvas.addEventListener('mouseleave', () => { mouse.down = false; });

        // 触摸
        canvas.addEventListener('touchstart', e => {
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            mouse.x = mouse.bx = (t.clientX - rect.left) / rect.width * canvas.width;
            mouse.y = mouse.by = (canvas.height - (t.clientY - rect.top) / rect.height * canvas.height);
            mouse.down = true;
        }, { passive: true });
        canvas.addEventListener('touchmove', e => {
            const t = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            mouse.x = (t.clientX - rect.left) / rect.width * canvas.width;
            mouse.y = (canvas.height - (t.clientY - rect.top) / rect.height * canvas.height);
        }, { passive: true });
        canvas.addEventListener('touchend', () => { mouse.down = false; }, { passive: true });

        // 暂停/恢复 (空格)
        window.addEventListener('keydown', e => {
            if (e.key === ' ' && e.target === document.body) {
                e.preventDefault();
                paused = !paused;
                if (!paused) {
                    const now = performance.now() / 1000;
                    const elapsed = now - startTime;
                    pauseOffset = elapsed - (lastTime ? lastTime - startTime : 0);
                }
                showHud(paused ? '⏸ 已暂停' : '▶ 已恢复');
            }
            if (e.key === 'e' || e.key === 'E') {
                toggleEditor();
            }
            if (e.key === 'Escape') {
                closeEditor();
            }
        });

        // ============================================================
        // 6. 编辑器 UI
        // ============================================================
        const overlay = document.getElementById('inputOverlay');
        const textarea = document.getElementById('shaderCode');
        const applyBtn = document.getElementById('applyBtn');
        const closeBtn = document.getElementById('closeBtn');
        const defaultBtn = document.getElementById('defaultBtn');
        const editBtn = document.getElementById('editBtn');
        const hud = document.getElementById('hud');

        function showHud(msg) {
            hud.textContent = msg;
            hud.classList.add('show');
            clearTimeout(hud._timer);
            hud._timer = setTimeout(() => hud.classList.remove('show'), 2000);
        }

        function toggleEditor() {
            overlay.classList.toggle('open');
            if (overlay.classList.contains('open')) {
                textarea.focus();
            }
        }

        function closeEditor() {
            overlay.classList.remove('open');
        }

        function applyShader(code) {
            const success = createProgram(code);
            if (success) {
                showHud('✓ Shader 编译成功');
                closeEditor();
            } else {
                showHud('✗ Shader 编译失败，请检查控制台错误信息');
            }
        }

        editBtn.addEventListener('click', toggleEditor);

        applyBtn.addEventListener('click', () => {
            applyShader(textarea.value);
        });

        closeBtn.addEventListener('click', closeEditor);

        defaultBtn.addEventListener('click', () => {
            textarea.value = DEFAULT_SHADER;
        });

        // Ctrl+Enter 快速应用
        textarea.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                applyShader(textarea.value);
            }
        });

        // ============================================================
        // 7. 启动
        // ============================================================
        textarea.value = DEFAULT_SHADER;
        createProgram(DEFAULT_SHADER);
        resize();
        requestAnimationFrame(render);

        window.addEventListener('resize', resize);

        // 用户离开/回来自动暂停
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (!paused) {
                    paused = true;
                }
            } else {
                if (paused) {
                    paused = false;
                    const now = performance.now() / 1000;
                    const elapsed = now - startTime;
                    pauseOffset = elapsed - (lastTime ? lastTime - startTime : 0);
                }
            }
        });

        console.log('✅ ShaderToy 本地运行器已启动');
        console.log('📝 快捷键: [E] 编辑  [Esc] 关闭  [Space] 暂停/恢复  [Ctrl+Enter] 应用');
    </script>
</body>
</html>
