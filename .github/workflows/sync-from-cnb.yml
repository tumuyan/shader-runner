name: Sync from CNB

on:
  schedule:
    - cron: '0 * * * *'   # 每小时运行一次
  workflow_dispatch:
    inputs:
      force_push:
        description: '使用cnb代码覆盖本仓库'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PERSONAL_TOKEN }}

      - name: Add CNB remote and sync
        run: |
          git remote add cnb https://cnb.cool/ai-zoomer/shader-runner
          git fetch cnb main
          # 定时触发时正常 push（失败则报错）
          # 手动触发时可勾选"强制同步"来覆盖 GitHub 历史
          PUSH_ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_push }}" = "true" ]; then
            PUSH_ARGS="--force"
          fi
          git push $PUSH_ARGS origin refs/remotes/cnb/main:refs/heads/main
